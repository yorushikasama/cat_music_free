      <circle cx="34" cy="3" r="13" fill="#FF5A1F"/>
      <text x="27" y="8" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="800" fill="white">6</text>
      <text x="-2" y="48" class="navActive">歌单</text>
