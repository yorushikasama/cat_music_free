    <rect x="0" y="24" width="110" height="150" rx="18" fill="#FFFFFF"/>
    <rect x="132" y="24" width="110" height="150" rx="18" fill="#FFFFFF"/>
    <rect x="264" y="24" width="110" height="150" rx="18" fill="#FFFFFF"/>
    <rect x="14" y="38" width="82" height="82" rx="16" fill="url(#coverC)"/>
    <rect x="146" y="38" width="82" height="82" rx="16" fill="url(#coverB)"/>
    <rect x="278" y="38" width="82" height="82" rx="16" fill="#DCE8FF"/>
    <path d="M310 67v28l22-14z" fill="#4F7CFF"/>
    <text x="14" y="143" class="caption" fill="#111827">今日私人推荐</text>
    <text x="146" y="143" class="caption" fill="#111827">华语热歌</text>
    <text x="278" y="143" class="caption" fill="#111827">轻音乐放松</text>
