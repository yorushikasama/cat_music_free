  <g transform="translate(322 27)" stroke="#111827" stroke-width="2" stroke-linecap="round">
    <path d="M0 12h3M7 8v4M14 4v8M21 1v11"/>
    <rect x="36" y="1" width="28" height="14" rx="4" fill="none"/>
    <rect x="39" y="4" width="15" height="8" rx="2" fill="#20C76A" stroke="none"/>
    <path d="M67 5l6-5-3 9h6l-8 8 3-9h-4z" fill="#111827" stroke="none"/>
  </g>

  <!-- header -->
  <g transform="translate(28 76)">
