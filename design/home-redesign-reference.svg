    <rect x="0" y="24" width="374" height="78" rx="22" fill="#FFFFFF"/>
    <rect x="18" y="39" width="48" height="48" rx="14" fill="#F1F4F8"/>
    <path d="M31 70l12-24 12 24M36 61h14" class="mutedStroke"/>
    <text x="84" y="55" class="h2" font-size="18">本周新歌榜</text>
    <text x="84" y="78" class="body">更新 42 首歌曲</text>
