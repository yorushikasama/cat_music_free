    <rect x="128" y="4" width="118" height="44" rx="22" fill="#FFFFFF" filter="url(#softShadow)"/>
    <text x="45" y="33" class="body">推荐</text>
    <text x="153" y="33" class="h2" font-size="18">最近播放</text>
    <text x="282" y="33" class="body">歌单</text>
