  <g transform="translate(20 752)">
    <rect x="0" y="0" width="390" height="74" rx="30" fill="#FFFFFF" filter="url(#pillShadow)"/>
    <rect x="14" y="12" width="54" height="50" rx="17" fill="#F3F5F8"/>
    <rect x="78" y="12" width="198" height="50" rx="18" fill="#FFFFFF"/>
    <rect x="78" y="12" width="46" height="46" rx="14" fill="url(#coverA)"/>
    <text x="136" y="34" class="body" fill="#111827">すずめ feat. 十明</text>
    <text x="136" y="53" class="caption">RADWIMPS</text>
    <circle cx="317" cy="37" r="22" fill="#1BA7C6" opacity="0.12"/>
    <path d="M310 27v20l16-10z" fill="#1BA7C6"/>
    <path d="M356 27h20M356 37h20M356 47h13" class="stroke"/>
