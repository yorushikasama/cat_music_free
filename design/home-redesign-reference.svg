<svg width="430" height="932" viewBox="0 0 430 932" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="24" y1="20" x2="420" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFF"/>
      <stop offset="0.48" stop-color="#F5F7FB"/>
      <stop offset="1" stop-color="#EEF4F7"/>
    </linearGradient>
    <linearGradient id="coverA" x1="52" y1="152" x2="104" y2="204" gradientUnits="userSpaceOnUse">
      <stop stop-color="#78C6FF"/>
      <stop offset="1" stop-color="#6B7CFF"/>
    </linearGradient>
    <linearGradient id="coverB" x1="294" y1="296" x2="370" y2="372" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB86B"/>
      <stop offset="1" stop-color="#FF6F91"/>
    </linearGradient>
    <linearGradient id="coverC" x1="52" y1="522" x2="128" y2="598" gradientUnits="userSpaceOnUse">
      <stop stop-color="#95E0C8"/>
      <stop offset="1" stop-color="#3C8DFF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="13" flood-color="#1B2430" flood-opacity="0.12"/>
    </filter>
    <filter id="pillShadow" x="-20%" y="-50%" width="140%" height="220%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1B2430" flood-opacity="0.16"/>
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#FFFFFF" flood-opacity="0.9"/>
    </filter>
    <style>
      .title { font: 700 29px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .h2 { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .body { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6B7280; }
      .caption { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #8A93A3; }
      .nav { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #7A8494; }
      .navActive { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .stroke { stroke: #1F2937; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .mutedStroke { stroke: #7A8494; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
