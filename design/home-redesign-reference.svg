    <path d="M23 33c6-10 12-17 23-22-2 9-6 19-14 30 7-2 13-2 19-1-8 8-19 12-34 12 5-6 7-12 6-19z" fill="#32A6FF"/>
    <text x="78" y="27" class="title">CatMusicFree</text>
